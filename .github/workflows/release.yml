name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (must already exist, e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform_tag }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_tag: windows-x86_64
            ext: .exe
          - os: ubuntu-latest
            platform_tag: linux-x86_64
            ext: ""
          - os: macos-latest
            platform_tag: macos-arm64
            ext: ""
          - os: macos-13
            platform_tag: macos-x86_64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk-dev

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(python -c 'import sys; sys.path.insert(0, "src"); from gmpf_sync import __version__; print(__version__)')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build executable
        run: python build.py

      - name: Rename artifact
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PLATFORM_TAG: ${{ matrix.platform_tag }}
          EXT: ${{ matrix.ext }}
        run: |
          src="dist/gmpf-sync-${VERSION}${EXT}"
          dst="dist/gmpf-sync-${VERSION}-${PLATFORM_TAG}${EXT}"
          if [ ! -f "$src" ]; then
            echo "Expected build output not found: $src" >&2
            ls -la dist/ || true
            exit 1
          fi
          mv "$src" "$dst"
          echo "Artifact: $dst"
          ls -la "$dst"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmpf-sync-${{ matrix.platform_tag }}
          path: dist/gmpf-sync-*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Resolve tag and version
        id: meta
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python - <<'PY' > release_notes.md
          import os, re, pathlib, sys
          version = os.environ["VERSION"]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          # Match "## [version]" up to the next "## [" heading or EOF.
          pattern = re.compile(
              rf"^##\s*\[{re.escape(version)}\][^\n]*\n(.*?)(?=^##\s*\[|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          m = pattern.search(text)
          if not m:
              sys.stderr.write(f"No CHANGELOG.md section for version {version}\n")
              # Fall back to a minimal note so the release still publishes.
              sys.stdout.write(f"Release {version}.\n")
          else:
              sys.stdout.write(m.group(1).strip() + "\n")
          PY
          echo "--- release_notes.md ---"
          cat release_notes.md

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          body_path: release_notes.md
          files: artifacts/gmpf-sync-*
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
